    <header class="app-header">
        <div class="app-header-top">
            <h1 class="app-title">⚔️ D&D Kampagnen-Tracker Pro</h1>
            <div class="global-search-container">
                <span class="global-search-icon">🔍</span>
                <input type="text" class="global-search-input" id="global-search" placeholder="Suche NPCs, Orte, Quests..." data-action="search-input" data-render="debouncedGlobalSearch" aria-label="Globale Suche">
                <div class="global-search-results" id="global-search-results"></div>
            </div>
            <div class="header-actions">
                <!-- PWA Install Button (versteckt; Welle 2 aktiviert Sichtbarkeit) -->
                <button class="pwa-install-btn" data-action="install-pwa" style="display:none" aria-label="App installieren">App installieren</button>
                <!-- Info/Impressum Button -->
                <button class="header-action-btn" data-action="show-about-modal" title="Über diese App" aria-label="Über diese App">ℹ️</button>
                <div class="header-divider"></div>
                <!-- Schnellnotizen Button -->
                <button class="header-action-btn" data-action="toggle-quick-notes" title="Schnellnotizen" aria-label="Schnellnotizen öffnen">📝</button>
                <div class="header-divider"></div>
                <!-- Session Timer -->
                <div class="session-timer" id="session-timer">
                    <span class="session-timer-icon">⏱️</span>
                    <span class="session-timer-display" id="session-timer-display">00:00:00</span>
                    <button class="session-timer-btn" data-action="call" data-value="toggleSessionTimer" id="session-timer-toggle" title="Start/Pause" aria-label="Timer starten oder pausieren">▶️</button>
                    <button class="session-timer-btn" data-action="call" data-value="resetSessionTimer" title="Reset" aria-label="Timer zurücksetzen">🔄</button>
                </div>
                <div class="header-divider"></div>
                <!-- Save Indicator -->
                <div class="save-indicator saved" id="save-indicator">
                    <span class="save-indicator-dot"></span>
                    <span class="save-indicator-text">Gespeichert</span>
                </div>
                <!-- Backup-Warnindikator (versteckt; Welle 2 aktiviert Sichtbarkeit) -->
                <div class="backup-warning-indicator" style="display:none" aria-hidden="true"></div>
                <div class="header-divider"></div>
                <button class="header-action-btn" data-action="undo" title="Rückgängig (Strg+Z)" aria-label="Letzte Aktion rückgängig machen">↩️</button>
                <button class="header-action-btn" data-action="redo" title="Wiederholen (Strg+Y)" aria-label="Letzte Aktion wiederholen">↪️</button>
                <button class="header-action-btn" data-action="show-shortcuts-overlay" title="Tastenkürzel (?)" aria-label="Tastenkürzel anzeigen">⌨️</button>
                <button class="header-action-btn" data-action="toggle-layout" title="Layout wechseln" id="layout-switcher" aria-label="Layout wechseln">
                    <span id="layout-icon">🖥️</span>
                </button>
            </div>
        </div>
        <div class="mobile-nav-toggle" data-action="call" data-value="toggleMobileNav">
            <span class="mobile-nav-toggle-text">📍 Navigation</span>
            <span class="mobile-nav-toggle-icon">▲</span>
        </div>
        <nav class="nav-tabs" id="nav-tabs-container" role="tablist" aria-label="Hauptnavigation">
            <button class="nav-tab active" data-view="dashboard" draggable="true" role="tab" aria-selected="true">🏠 Start</button>
            <button class="nav-tab" data-view="party" draggable="true" role="tab" aria-selected="false">👥 Party</button>
            <button class="nav-tab" data-view="npcs" draggable="true" role="tab" aria-selected="false">🎭 NPCs</button>
            <button class="nav-tab" data-view="locations" draggable="true" role="tab" aria-selected="false">🏠 Orte</button>
            <button class="nav-tab" data-view="quests" draggable="true" role="tab" aria-selected="false">📜 Quests</button>
            <button class="nav-tab" data-view="encounter" draggable="true" role="tab" aria-selected="false">👹 Encounter</button>
            <button class="nav-tab" data-view="initiative" draggable="true" role="tab" aria-selected="false">⚔️ Initiative</button>
            <button class="nav-tab" data-view="shops" draggable="true" role="tab" aria-selected="false">🏪 Shops</button>
            <button class="nav-tab" data-view="loot" draggable="true" role="tab" aria-selected="false">📦 Truhe</button>
            <button class="nav-tab" data-view="spells" draggable="true" role="tab" aria-selected="false">✨ Zauber</button>
            <button class="nav-tab" data-view="wiki" draggable="true" role="tab" aria-selected="false">📚 Wiki</button>

            <button class="nav-tab" data-view="notes" draggable="true" role="tab" aria-selected="false">📝 Notizen</button>

            <button class="nav-tab" data-view="links" draggable="true" role="tab" aria-selected="false">🔗 Links</button>
            <button class="nav-tab" data-view="dice" draggable="true" role="tab" aria-selected="false">🎲 Würfel</button>
            <button class="nav-tab" data-view="timers" draggable="true" role="tab" aria-selected="false">⏱️ Timer</button>
            <button class="nav-tab" data-view="data" draggable="true" role="tab" aria-selected="false">💾 Daten</button>
            <button class="nav-tab" data-view="dmscreen" draggable="true" role="tab" aria-selected="false">🎮 DM Screen</button>
            <button class="nav-tab" data-action="call" data-value="showDebugModal" style="color: var(--purple);">🧪 Debug</button>
            <button class="nav-tab" data-action="call" data-value="showThemeModal" style="color: var(--cyan);">🎨</button>
        </nav>
    </header>
    
    <main class="main-content">
