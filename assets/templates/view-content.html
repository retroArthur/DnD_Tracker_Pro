        <!-- NPCS VIEW - Master-Detail Layout -->
        <section id="view-npcs" class="view npc-view">
            <div class="section-toolbar">
                <!-- Gruppe 1: Identität -->
                <div class="section-toolbar-identity">
                    <span class="section-toolbar-title">🎭 NPCs</span>
                    <span class="section-toolbar-count" id="npcs-io-count">0</span>
                </div>
                <!-- Gruppe 2: Suche -->
                <div class="section-toolbar-search">
                    <div class="search-wrapper">
                        <input type="text" id="npc-search" class="toolbar-search" placeholder="🔍 NPC suchen..." data-action="search-input" data-render="renderNPCList">
                        <button class="search-clear-btn" data-action="clear-search" data-value="npc-search" title="Suche leeren">✕</button>
                    </div>
                </div>
                <!-- Gruppe 3: Filter + IO -->
                <div class="section-toolbar-filters">
                    <div class="npc-filter-chips" id="npc-filters"></div>
                    <div class="section-toolbar-io">
                        <button class="io-btn export" data-action="export-data" data-value="npcs" title="NPCs exportieren">📤</button>
                        <button class="io-btn import" data-action="trigger-click" data-value="import-npcs" title="NPCs importieren">📥</button>
                        <input type="file" id="import-npcs" class="io-file-input" accept=".json" data-on-change="import-data" data-type="npcs">
                    </div>
                </div>
                <!-- Gruppe 4: Primäre Aktion -->
                <div class="section-toolbar-actions">
                    <button class="btn btn-success" data-action="show-modal" data-value="npc-modal">+ NPC</button>
                </div>
            </div>

            <!-- Master-Detail Layout -->
            <div class="npc-layout">
                <!-- Liste (Master) -->
                <div class="npc-master">
                    <div class="npc-list" id="npc-list"></div>
                </div>

                <!-- Detail-Sidebar -->
                <div class="npc-detail" id="npc-detail-panel">
                    <div class="npc-detail-empty">
                        <div class="npc-detail-empty-icon">🎭</div>
                        <div class="npc-detail-empty-text">Wähle einen NPC aus der Liste</div>
                    </div>
                </div>
            </div>
        </section>
