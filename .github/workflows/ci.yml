name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build bundled HTML for E2E
        run: python build.py
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/e2e/reports
            tests/e2e/test-results
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm ci
      - run: python build.py --production

      - name: Check bundle size budget
        run: |
          SIZE=$(stat -c%s dist/dnd-tracker-optimized.html)
          BUDGET=2300000
          PRETTY=$(awk -v s=$SIZE 'BEGIN { printf "%.2f", s/1024/1024 }')
          echo "Bundle: ${SIZE} bytes (${PRETTY} MB) | Budget: ${BUDGET} bytes"
          echo "BUNDLE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "BUNDLE_PRETTY=$PRETTY" >> $GITHUB_ENV
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::Bundle size $SIZE exceeds budget $BUDGET"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/dnd-tracker-optimized.html
          retention-days: 7

      - name: Comment PR with preview link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### Preview-Build verfügbar',
              '',
              `Bundle: \`${process.env.BUNDLE_PRETTY} MB\``,
              '',
              `Download: [production-build Artifact](${runUrl}#artifacts) (7 Tage gültig)`,
              '',
              '1. ZIP entpacken',
              '2. `dnd-tracker-optimized.html` im Browser öffnen',
              '',
              '_Auto-generiert von CI_',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '_Auto-generiert von CI_';
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
