name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm ci
      - run: python build.py --production
      - uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/dnd-tracker-optimized.html
          retention-days: 7

  smoke-test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/
      - name: Starte HTTP-Server
        run: python -m http.server 8000 --directory dist &
        shell: bash
      - name: Warte auf Server
        run: sleep 2
      - name: Smoke-Test
        run: npx playwright test --config=playwright.smoke.config.js
        env:
          SMOKE_BASE_URL: http://localhost:8000/dnd-tracker-optimized.html

  deploy:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: python build.py --production
      - name: Bereite Pages-Artefakt vor
        # CR-09: KEIN vorab existierendes Zielverzeichnis fuer cp -r — GNU cp
        # kopiert sonst das Quellverzeichnis HINEIN (dist/assets/fonts/fonts/*)
        # und die SW-Precache-Pfade ./assets/fonts/*.woff2 waeren 404.
        run: |
          cp manifest.webmanifest dist/manifest.webmanifest
          cp -r icons dist/
          mkdir -p dist/assets
          cp -r assets/fonts dist/assets/
        shell: bash
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist/
      - uses: actions/deploy-pages@v4
        id: deployment
